name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  build:                          
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env: 
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: your_db
          MYSQL_USER: your_user
          MYSQL_PASSWORD: your_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5                
    steps:                        
      - name: Get the code        
        uses: actions/checkout@v5
      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        working-directory: flask
        run: pip install -r requirements.txt
      - name: Initialize database
        run: mysql -h 127.0.0.1 -u your_user -pyour_password your_db < init.sql
      - name: Run test
        working-directory: flask
        env:
          DB_HOST: 127.0.0.1
          DB_USER: your_user
          DB_PASSWORD: your_password
          DB_NAME: your_db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: pytest -v

      - name: Connection to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: build Docker image flask
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/blog-api-flask:latest ./flask

      - name: build Docker image nginx
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/blog-api-nginx:latest ./nginx

      - name: push docker image flask
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/blog-api-flask:latest

      - name: push docker image nginx
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/blog-api-nginx:latest
